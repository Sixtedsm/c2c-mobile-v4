name: Deploy V4 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` would fail on package-lock churn; install instead so the
      # build is robust to lockfile updates.
      - run: npm install --no-audit --no-fund

      # Auto-enable Pages so deploy-pages doesn't 404 on first run.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm run build:v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
